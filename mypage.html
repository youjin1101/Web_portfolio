그리고 로그인 박스를 클릭하여 sign in html로 갔더니 로그인 박스는 개좆만해짐.

            <button class="closebtn" onclick="closeSidebar()">X</button>

        4. 쿠폰함
        -->

        <!-- 우측 로그인 박스 -->
        <div class="login-box" id="loginbox">
            <h3>로그인</h3>
            <input type="text" id="username" placeholder="ID">
