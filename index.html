<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>갈매기 야구 마켓</title>
    <link type="text/css" rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ======== 상단 로고 ========== -->
    <div class="header">
        <!-- 로고 (가운데 위치) -->
        <div class="logo">갈매기 야구 마켓</div>
        <!-- 오른쪽 상단 로그인 버튼 -->
        <button class="login-btn">Login</button>
    </div>

    <!-- ============ 메뉴바 ============== -->
    <ul>
        <li><a>HOME</a></li>
        <li><a>ABOUT US</a></li>
        <li><a>PRODUCT</a></li>
        <li><a>MY CART</a></li>
        <li><a>MY PAGE</a></li>
        <li><a>Q&A</a></li>
    </ul>

    <!-- =========== 전체 레이아웃 ============ -->
    <div class="container">
        <!-- 좌측 카테고리 -->
        <div class="sidebar">
            <h3>카테고리</h3>
            <div class="category-item">유니폼</div>
            <div class="category-item">응원 도구</div>
            <div class="category-item">글러브</div>
            <div class="category-item">야구 배트</div>
            <div class="category-item">악세사리</div>
            <div class="category-item">생활잡화</div>
        </div>
        <!-- 중앙 상품 리스트 -->
        <div class="main">
            <h2>상품 목록</h2>

            <div class="product-grid">
                <!-- 상품 카드 6개 -->
                <div class="product-card"><img src="tetsubat.jpg"><p>상품명</p><p>₩10,000</p></div>
                <div class="product-card"><img src="greenbat.jpg"><p>상품명</p><p>₩10,000</p></div>
                <div class="product-card"><img src="greyglove.jpg"><p>상품명</p><p>₩10,000</p></div>
                <div class="product-card"><img src="blackglove.jpg"><p>상품명</p><p>₩10,000</p></div>
                <div class="product-card"><img src="brownglove.jpg"><p>상품명</p><p>₩10,000</p></div>
                <div class="product-card"><img src="hitoriball.jpg"><p>상품명</p><p>₩10,000</p></div>
            </div>
        </div>

        <!-- 우측 로그인 박스 -->
        <div class="login-box">
            <h3>로그인</h3>
            <input type="text" placeholder="아이디">
            <input type="password" placeholder="비밀번호">
            <button>Login</button>
        </div>

    </div>

    <footer>
        ©minyoujin
    </footer>

</body>
</html>

<!-- 우측 하단에 최상단 TOP 가는 버튼 화면 고정으로 생성
 
-->
