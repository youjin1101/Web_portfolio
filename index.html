<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 갈매기 야구 마켓</title>
    <link type="text/css" rel="stylesheet" href="style.css">
</head>

<body>
    <!-- ======== 상단 로고 ========== -->
    <div class="header">
        <!-- 로고 (가운데 위치) -->
        <a href="index.html" class="logo">갈매기 야구 마켓</a>
        <!-- 오른쪽 상단 로그인 버튼 -->
        <a href="sign_in.html" class="login-btn" id="upperloginbtn">Login</a>
    </div>

    <!--=== 햄버거 버튼(모바일에서 보이게 pc는 ㄴㄴ)==-->
    <button class="hamburger" id="hamburger" onclick="openSidebar()">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <!-- 모바일에서 사이드바 열면 배경 어둡게 하기 -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <!-- ============ 메뉴바 ============== -->
    <ul>
        <li><a href="index.html">HOME</a></li>
        <li class="hide-mobile"><a href="introduce.html">ABOUT US</a></li>
        <li><a href="all_product.html">PRODUCT</a></li>
        <li class="hide-mobile"><a href="mycart.html">MY CART</a></li>
        <li class="hide-mobile"><a href="mypage.html">MY PAGE</a></li>
    </ul>

    <!-- =========== 전체 레이아웃 ============ -->
    <div class="container">
        <!-- 좌측 카테고리 사이드바 -->
        <div class="sidebar" id="sidebar">
            <!-- 모바일에서 사이드바 닫을 때 누를 X버튼-->
            <button class="closebtn" onclick="closeSidebar()">X</button>
            <div class="sidebar-login">
                <a href="sign_in.html" class="sidebar-loginbtn">Login</a>
            </div>
            <h3>카테고리</h3>
            <div class="category-item"><a href="all_product.html">모든 상품</a></div>
            <div class="category-item"><a href="uniform.html">유니폼</a></div>
            <div class="category-item"><a href="cheer.html">응원 도구</a></div>
            <div class="category-item"><a href="Glove.html">글러브</a></div>
            <div class="category-item"><a href="Bat.html">야구 배트</a></div>
            <div class="category-item"><a href="seikatsu.html">생활잡화</a></div>
            <div class="sidebar-hide" id="sidebar-hide">
                <div class="sidebar-hide-menu"><a href="introduce.html">ABOUT US</a></div>
                <div class="sidebar-hide-menu"><a href="mycart.html">MY CART</a></div>
                <div class="sidebar-hide-menu"><a href="mypage.html">MY PAGE</a></div>
            </div>
        </div>
        <!-- 중앙 상품 리스트 -->
        <div class="main">
            <h2>추천 상품 목록</h2>
            <div class="product-grid">
                <!-- 상품 카드 6개 -->
                <div class="product-card">
                    <img src="tetsubat.jpg">
                    <p>무거운 배트</p>
                    <p>₩70,000</p>
                    <button class="wishlist-btn" onclick="addcart(
                        '무거운 배트', 70000, 'tetsubat.jpg'
                    )">장바구니</button>
                </div>
                <div class="product-card">
                    <img src="greenbat.jpg">
                    <p>가벼운 배트</p>
                    <p>₩60,000</p>
                    <button class="wishlist-btn" onclick="addcart(
                        '가벼운 배트', 60000, 'greenbat.jpg'
                    )">장바구니</button>
                </div>
                <div class="product-card">
                    <img src="greyglove.jpg">
                    <p>회색 글러브</p>
                    <p>₩35,000</p>
                    <button class="wishlist-btn" onclick="addcart(
                        '회색 글러브', 35000, 'greyglove.jpg'
                    )">장바구니</button>
                </div>
                <div class="product-card">
                    <img src="blackglove.jpg">
                    <p>검은색 글러브</p>
                    <p>₩20,000</p>
                    <button class="wishlist-btn" onclick="addcart(
                        '검은색 글러브', 20000, 'blackglove.jpg'
                    )">장바구니</button>
                </div>
                <div class="product-card">
                    <img src="brownglove.jpg">
                    <p>갈색 글러브</p>
                    <p>₩25,000</p>
                    <button class="wishlist-btn" onclick="addcart(
                        '갈색 글러브', 25000, 'brownglove.jpg'
                    )">장바구니</button>
                </div>
                <div class="product-card">
                    <img src="hitoriball.jpg">
                    <p>야구공</p>
                    <p>₩5,000</p>
                    <button class="wishlist-btn" onclick="addcart(
                        '야구공', 5000, 'hitoriball.jpg'
                    )">장바구니</button>
                </div>
            </div>
        </div>

        <!-- 우측 로그인 박스 -->
        <div class="login-box" id="loginbox">
            <h3>로그인</h3>
            <input type="text" id="username" placeholder="ID">
            <input type="password" id="password" placeholder="Password">
            <button id="loginbtn" onclick="login()">Login</button>
            <p id="message"></p>
        </div>
    </div>
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="topbtn">TOP</button>
    <footer>
        Copyright ©minyoujin ALL RIGHTS RESERVED
    </footer>
    <script src="script.js"></script>
</body>
</html>
