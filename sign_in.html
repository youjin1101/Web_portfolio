<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 갈매기 야구 마켓</title>
    <link type="text/css" rel="stylesheet" href="style.css">
    <style>
        .container {
            display: flex;
        }
        .sidebar {
            width: 200px;
            background: white;
        }
        .main-content {
            flex: 1;
            background-image:
            linear-gradient(0deg, rgba(0, 0, 0, 0.5), rgba(0, 0, 0, 0.5)), url("baseball_field.jpg");
            background-size: cover;
            background-position: center;
        }
        .signin-box {
            position: relative;
            margin: 50px auto;
            width: 400px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            background-color: rgba(255, 255, 255, 0.5);
            border-radius: 7px;
            box-sizing: border-box;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        .signin-box button {
            padding: 15px;
            font-size: 1.1em;
            border: none;
            background-color: #8cc7ff;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .signin-box input {
            font-size: 1.1em;
            padding: 15px;
            margin-bottom: 25px;
            border: 1px solid #d9d9d9;
            border-radius: 8px;
            background-color: #fafafa;
            box-sizing: border-box;
        }
        @media screen and (max-width : 768px) {
            .signin-box {
                width: 90%;
                max-width : 350px;
                padding: 30px;
                margin : 30px auto;
            }
        }
    </style>
</head>

<body>
    <!-- ======== 상단 로고 ========== -->
    <div class="header">
        <!-- 로고 (가운데 위치) -->
        <a href="index.html" class="logo">갈매기 야구 마켓</a>
        <!-- 오른쪽 상단 로그인 버튼 -->
        <a href="sign_in.html" class="login-btn" id="upperloginbtn">Login</a>
    </div>

    <!--=== 햄버거 버튼(모바일에서 보이게 pc는 ㄴㄴ)==-->
    <button class="hamburger" id="hamburger" onclick="openSidebar()">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <!-- 모바일에서 사이드바 열면 배경 어둡게 하기 -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <!-- ============ 메뉴바 ============== -->
    <ul>
        <li><a href="index.html">HOME</a></li>
        <li class="hide-mobile"><a href="introduce.html">ABOUT US</a></li>
        <li><a href="all_product.html">PRODUCT</a></li>
        <li class="hide-mobile"><a href="mycart.html">MY CART</a></li>
        <li class="hide-mobile"><a href="mypage.html">MY PAGE</a></li>
    </ul>

    <!-- =========== 전체 레이아웃 ============ -->
    <div class="container">
        <!-- 좌측 카테고리 사이드바 -->
        <div class="sidebar" id="sidebar">
            <!-- 모바일에서 사이드바 닫을 때 누를 X버튼-->
            <button class="closebtn" onclick="closeSidebar()">X</button>
            <div class="sidebar-login">
                <a href="sign_in.html" class="sidebar-loginbtn">Login</a>
            </div>
            <h3>카테고리</h3>
            <div class="category-item"><a href="all_product.html">모든 상품</a></div>
            <div class="category-item"><a href="uniform.html">유니폼</a></div>
            <div class="category-item"><a href="cheer.html">응원 도구</a></div>
            <div class="category-item"><a href="Glove.html">글러브</a></div>
            <div class="category-item"><a href="Bat.html">야구 배트</a></div>
            <div class="category-item"><a href="seikatsu.html">생활잡화</a></div>
            <div class="sidebar-hide" id="sidebar-hide">
                <div class="sidebar-hide-menu"><a href="introduce.html">ABOUT US</a></div>
                <div class="sidebar-hide-menu"><a href="mycart.html">MY CART</a></div>
                <div class="sidebar-hide-menu"><a href="mypage.html">MY PAGE</a></div>
            </div>
        </div>
        <div class="main-content">
            <!-- 중앙 로그인 박스 -->
            <div class="signin-box" id="signinbox">
                <input type="email" id="username" placeholder="ID" />
                <input type="password" id="password" placeholder="Password" />
                <button onclick="login()">Sign in</button>
                <p id="message"></p>
            </div>
        </div>
    </div>
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="topbtn">TOP</button>
    <footer>
        Copyright ©minyoujin ALL RIGHTS RESERVED
    </footer>
    <script src="script.js"></script>
</body>
</html>
