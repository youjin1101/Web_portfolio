<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> 갈매기 야구 마켓</title>
    <link type="text/css" rel="stylesheet" href="style.css"> 
    <style>
        .lotte, .wanttowin {
            color: white;
            text-align: center;
            font-weight: bold;
            min-height: 40px;
        }
        .resultbtn {
            color: #fff;
            text-decoration: none;
            outline: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            border: 2px solid #000;
            cursor: pointer;
            background: #000;
            transition: 0.2s;
        }
        .resultbtn:hover {
            transform: translateY(-4px);
        }
        .btngroup {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        /* background img background img background img */
        .main {
            background-image: 
            linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)
            ), url("ground_skyview.jpg");
            background-size: cover;
            background-position: center;
            min-height: 600px;
            padding: 40px;
            box-sizing: border-box;
        }
        .intro-text {
            color: white;
            text-align: center;
            margin-top: 50px;
            line-height: 1.8;
        }
    </style>
    <script>
        function changeresult() {
            const lotte =
            document.getElementById("lotte");
            const wanttowin =
            document.getElementById("wanttowin");
            const resultbtn =
            document.getElementById("resultbtn");
            if(lotte.innerHTML === "Lotte Giants 승리") {
                lotte.innerHTML ="Lotte Giants";
                wanttowin.innerHTML ="망해";
                resultbtn.innerHTML ="롯데 승리 시 클릭";
            }
            else {
                lotte.innerHTML ="Lotte Giants 승리";
                wanttowin.innerHTML ="희망해요";
                resultbtn.innerHTML ="롯데 패배 시 클릭";
            }
        }
    </script>
</head>

<body>
    <!-- ======== 상단 로고 ========== -->
    <div class="header">
        <!-- 로고 (가운데 위치) -->
        <a href="index.html" class="logo">갈매기 야구 마켓</a>
        <!-- 오른쪽 상단 로그인 버튼 -->
        <a href="sign_in.html" class="login-btn" id="upperloginbtn">Login</a>
    </div>

    <!--=== 햄버거 버튼(모바일에서 보이게 pc는 ㄴㄴ)==-->
    <button class="hamburger" id="hamburger" onclick="openSidebar()">
        <span></span>
        <span></span>
        <span></span>
    </button>
    <!-- 모바일에서 사이드바 열면 배경 어둡게 하기 -->
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>
    <!-- ============ 메뉴바 ============== -->
    <ul>
        <li><a href="index.html">HOME</a></li>
        <li class="hide-mobile"><a href="introduce.html">ABOUT US</a></li>
        <li><a href="all_product.html">PRODUCT</a></li>
        <li class="hide-mobile"><a href="mycart.html">MY CART</a></li>
        <li class="hide-mobile"><a href="mypage.html">MY PAGE</a></li>
    </ul>

    <!-- =========== 전체 레이아웃 ============ -->
    <div class="container">
        <!-- 좌측 카테고리 사이드바 -->
        <div class="sidebar" id="sidebar">
            <!-- 모바일에서 사이드바 닫을 때 누를 X버튼-->
            <button class="closebtn" onclick="closeSidebar()">X</button>
            <div class="sidebar-login">
                <a href="sign_in.html" class="sidebar-loginbtn">Login</a>
            </div>
            <h3>카테고리</h3>
            <div class="category-item"><a href="all_product.html">모든 상품</a></div>
            <div class="category-item"><a href="uniform.html">유니폼</a></div>
            <div class="category-item"><a href="cheer.html">응원 도구</a></div>
            <div class="category-item"><a href="Glove.html">글러브</a></div>
            <div class="category-item"><a href="Bat.html">야구 배트</a></div>
            <div class="category-item"><a href="seikatsu.html">생활잡화</a></div>
            <div class="sidebar-hide" id="sidebar-hide">
                <div class="sidebar-hide-menu"><a href="introduce.html">ABOUT US</a></div>
                <div class="sidebar-hide-menu"><a href="mycart.html">MY CART</a></div>
                <div class="sidebar-hide-menu"><a href="mypage.html">MY PAGE</a></div>
            </div>
        </div>
        <div class="main">
            <h2 class="lotte" id="lotte">Lotte Giants 승리</h2>
            <h2 class="wanttowin" id="wanttowin">희망해요</h2>
            <br>
            <div class="btngroup">
                <button onclick="changeresult()" class="resultbtn" id="resultbtn">
                    롯데가 패배하면 누르세요.
                </button>
            </div>
            <br>
            <div class="intro-text">
                <p> 갈매기 야구 마켓은
                    롯데 자이언츠 팬들을 위한
                    온라인 야구 굿즈 쇼핑몰입니다.
                </p>
            </div>
        </div>

        <!-- 우측 로그인 박스 -->
        <div class="login-box" id="loginbox">
            <h3>로그인</h3>
            <input type="text" id="username" placeholder="ID">
            <input type="password" id="password" placeholder="Password">
            <button id="loginbtn" onclick="login()">Login</button>
            <p id="message"></p>
        </div>
    </div>
    <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" id="topbtn">TOP</button>
    <footer>
        Copyright ©minyoujin ALL RIGHTS RESERVED
    </footer>
    <script src="script.js"></script>
</body>
</html>
